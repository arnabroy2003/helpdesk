<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="/static/js/firebase.js"></script>
</head>

<body class="bg-white flex flex-col h-screen">

<div id="chatBox" class="flex-1 overflow-y-auto p-4"></div>

<div class="p-3 flex">
  <textarea id="msg" class="flex-1 border rounded p-2"></textarea>
  <button onclick="sendMsg()" class="bg-purple-600 text-white px-4 ml-2 rounded">Send</button>
</div>

<audio id="notify" src="/static/sounds/notify.mp3"></audio>

<script>
const userId = "{{ user_id }}";

function sendMsg() {
  let text = document.getElementById("msg").value;

  db.ref("chats/" + userId + "/messages").push({
    sender: "student",
    text: text,
    timestamp: Date.now()
  });

  document.getElementById("msg").value = "";
}

db.ref("chats/" + userId + "/messages").on("child_added", snapshot => {
  let msg = snapshot.val();
  let div = document.createElement("div");

  div.className = msg.sender === "student" 
    ? "text-right mb-2"
    : "text-left mb-2";

  div.innerHTML = `
    <div class="inline-block px-4 py-2 rounded-xl 
    ${msg.sender === "student" ? "bg-purple-500 text-white" : "bg-gray-200"}">
      ${msg.text}
    </div>
  `;

  document.getElementById("chatBox").appendChild(div);

  document.getElementById("notify").play();

  document.getElementById("chatBox").scrollTop = 999999;
});
</script>

</body>
</html>
