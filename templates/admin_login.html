<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - QSkill</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-100 to-white flex items-center justify-center h-screen">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-96 border border-purple-200">
    
    <h2 class="text-2xl font-bold text-center text-purple-700 mb-6">
      QSkill Admin Login
    </h2>

    <form method="POST" class="space-y-4">

      <!-- Username -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">Username</label>
        <input 
          type="text" 
          name="username" 
          placeholder="Enter username"
          required
          class="w-full px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400"
        >
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">Password</label>
        <input 
          type="password" 
          name="password" 
          placeholder="Enter password"
          required
          class="w-full px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400"
        >
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="w-full bg-purple-600 hover:bg-purple-700 text-white py-2 rounded-xl transition-all duration-200"
      >
        Login
      </button>

    </form>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-6">
      © 2026 QSkill Help Desk
    </p>

  </div>

</body>
</html>
