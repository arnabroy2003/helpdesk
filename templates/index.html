<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md transform transition-all">
        
        <div class="absolute -top-12 -left-12 w-40 h-40 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
        <div class="absolute -bottom-12 -right-12 w-40 h-40 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>

        <form method="POST" class="relative glass-effect p-8 md:p-10 rounded-[2rem] shadow-[0_20px_50px_rgba(126,34,206,0.1)] border border-purple-50">
            
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-purple-200 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 tracking-tight">QSkill <span class="text-purple-600">Help Desk</span></h2>
                <p class="text-gray-400 text-sm mt-1">We're online. Let's talk.</p>
            </div>

            <div class="space-y-4">
                <div class="relative group">
                    <input type="text" name="name" placeholder="Full Name" required 
                        class="w-full px-5 py-4 bg-gray-50 border-transparent focus:border-purple-500 focus:bg-white focus:ring-0 rounded-2xl transition-all duration-300 outline-none text-gray-700 placeholder-gray-400 border-2" />
                </div>
                
                <div class="relative group">
                    <input type="email" name="email" placeholder="Email Address" required 
                        class="w-full px-5 py-4 bg-gray-50 border-transparent focus:border-purple-500 focus:bg-white focus:ring-0 rounded-2xl transition-all duration-300 outline-none text-gray-700 placeholder-gray-400 border-2" />
                </div>
            </div>

            <button class="mt-8 w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-4 rounded-2xl shadow-xl shadow-purple-200 transform hover:-translate-y-1 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group">
                <span>Start Chat</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </button>

            <p class="text-center text-xs text-gray-400 mt-6 uppercase tracking-widest font-medium">Secured by QSkill Pro</p>
        </form>
    </div>

</body>
</html>
